<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>월간 등가율 보드</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23005f73'/%3E%3Cpath d='M14 42h36v6H14zM18 34l8-10 8 7 12-16 4 3-15 21-8-7-7 9z' fill='white'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="./styles.css?v=20260428g">
  <style>
    .mobile-bottom-nav {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .calculator-card {
      padding: 22px;
    }

    .calculator-head {
      align-items: center;
    }

    .ghost-button {
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid rgba(15, 23, 42, 0.1);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.88);
      color: var(--text);
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .ghost-button:hover {
      transform: translateY(-1px);
      border-color: rgba(0, 95, 115, 0.24);
      box-shadow: 0 16px 28px -24px rgba(15, 23, 42, 0.28);
    }

    .calculator-summary-bar {
      margin-top: 18px;
      display: grid;
      gap: 6px;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid rgba(15, 23, 42, 0.07);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(248, 250, 252, 0.9)),
        linear-gradient(120deg, rgba(0, 95, 115, 0.05), transparent 55%);
      color: var(--muted);
      line-height: 1.6;
    }

    .calculator-summary-bar strong {
      color: var(--text);
      font-size: 13px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .calculator-grid {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .fib-card {
      min-height: 100%;
      padding: 18px;
      border-radius: 22px;
      border: 1px solid rgba(15, 23, 42, 0.08);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(249, 250, 252, 0.92)),
        linear-gradient(135deg, rgba(0, 95, 115, 0.05), transparent 48%);
      display: grid;
      gap: 12px;
    }

    .fib-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .fib-card-title {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .fib-card-caption {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .fib-card-badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(0, 95, 115, 0.08);
      border: 1px solid rgba(0, 95, 115, 0.14);
      color: var(--brand);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    .fib-form {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .fib-field {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .fib-field input {
      width: 100%;
      min-height: 46px;
      padding: 0 12px;
      border: 1px solid rgba(15, 23, 42, 0.1);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.96);
      color: var(--text);
      font-size: 16px;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .fib-field input:focus {
      border-color: rgba(0, 95, 115, 0.5);
      box-shadow: 0 0 0 4px rgba(0, 95, 115, 0.09);
      transform: translateY(-1px);
    }

    .fib-helper,
    .fib-meta {
      margin: 0;
      font-size: 12px;
      line-height: 1.6;
      color: var(--muted);
      min-height: 19px;
    }

    .fib-helper.is-error {
      color: #b42318;
    }

    .fib-results {
      display: grid;
      gap: 10px;
    }

    .fib-result {
      padding: 14px;
      border-radius: 16px;
      border: 1px solid rgba(15, 23, 42, 0.06);
      background: rgba(15, 23, 42, 0.03);
      display: grid;
      gap: 6px;
    }

    .fib-result-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .fib-result-label {
      color: var(--brand);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.06em;
    }

    .fib-result-price {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--text);
    }

    .fib-result-rate {
      margin: 0;
      font-size: 13px;
      font-weight: 700;
      color: var(--neutral);
    }

    @media (max-width: 1180px) {
      .calculator-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .calculator-card {
        padding: 12px;
        border-radius: 18px;
      }

      .calculator-head {
        gap: 10px;
      }

      .ghost-button {
        width: 100%;
      }

      .calculator-grid {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .fib-card {
        padding: 12px;
        gap: 8px;
        border-radius: 18px;
      }

      .fib-form {
        gap: 8px;
      }

      .fib-card-title {
        font-size: 18px;
      }

      .fib-field input {
        min-height: 42px;
        padding: 0 10px;
      }

      .fib-result {
        padding: 12px;
      }

      .fib-result-price {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <section class="toolbar-card panel">
      <div class="toolbar-row">
        <label class="compact-date-field" for="date-input">
          <span>기준일</span>
          <input id="date-input" type="date">
        </label>
        <div class="view-switcher" role="tablist" aria-label="화면 전환">
          <button
            id="view-calculator-button"
            class="view-switcher-button is-active"
            type="button"
            data-view="calculator"
            aria-pressed="true"
          >계산기</button>
          <button
            id="view-dashboard-button"
            class="view-switcher-button"
            type="button"
            data-view="dashboard"
            aria-pressed="false"
          >등가율</button>
          <button
            id="view-recommendation-button"
            class="view-switcher-button"
            type="button"
            data-view="recommendations"
            aria-pressed="false"
          >종목추천</button>
        </div>
      </div>
    </section>

    <section id="setup-card" class="setup-card panel" hidden>
      <div>
        <strong>Apps Script 게이트웨이 URL이 아직 비어 있습니다.</strong>
        <p>실데이터를 쓰려면 <code>config.js</code>에 배포한 <code>/exec</code> URL을 넣어주세요.</p>
      </div>
    </section>

    <section id="dashboard-summary" class="summary-card panel" data-view-page="dashboard" hidden>
      <div class="section-head summary-head">
        <div>
          <h2>종목 구성</h2>
        </div>

        <div class="status-stack">
          <p id="status-pill" class="status-pill">연결 준비 중</p>
          <p id="updated-at" class="updated-at">-</p>
          <div id="snapshot-health" class="snapshot-health" hidden>
            <p id="snapshot-health-text" class="snapshot-health-text">스냅샷 확인 중</p>
            <button id="snapshot-refresh-button" class="snapshot-refresh-button" type="button">최신으로 갱신</button>
          </div>
        </div>
      </div>

      <div id="slot-grid" class="slot-grid"></div>
    </section>

    <section id="recommendation-page" class="recommendation-card panel" data-view-page="recommendations" hidden>
      <div class="section-head recommendation-head">
        <div>
          <h2>피보나치 추천</h2>
          <p class="section-note">KOSPI200, KOSDAQ150 후보에서 선택한 기간의 고점과 저점을 기준으로 근접, 터치, 돌파, 이탈 조건 종목을 찾습니다.</p>
        </div>
        <button id="recommendation-run-button" class="primary-button" type="button">추천 찾기</button>
      </div>

      <div class="recommendation-filter-toolbar">
        <button id="recommendation-filter-toggle" class="recommendation-filter-toggle" type="button" aria-expanded="true">
          <span class="recommendation-filter-toggle-top">
            <span class="recommendation-filter-toggle-title">추천 필터</span>
            <span id="recommendation-filter-toggle-state" class="recommendation-filter-toggle-state">접기</span>
          </span>
          <span id="recommendation-filter-summary-inline" class="recommendation-filter-toggle-summary">전체 · 6개월 · 38.2% · 기준일</span>
        </button>
      </div>

      <div id="recommendation-filters-panel" class="recommendation-filters-panel">
        <div class="recommendation-filters">
          <label class="recommendation-field" for="recommendation-universe">
            <span>시장</span>
            <select id="recommendation-universe">
              <option value="KOSPI200">KOSPI200</option>
              <option value="KOSDAQ150" selected>KOSDAQ150</option>
            </select>
          </label>

          <label class="recommendation-field" for="recommendation-period">
            <span>기간</span>
            <select id="recommendation-period">
              <option value="3">3개월</option>
              <option value="6" selected>6개월</option>
              <option value="12">1년</option>
            </select>
          </label>

          <label class="recommendation-field" for="recommendation-level">
            <span>레벨</span>
            <select id="recommendation-level">
              <option value="0.236">23.6%</option>
              <option value="0.382" selected>38.2%</option>
              <option value="0.5">50.0%</option>
            </select>
          </label>

          <label class="recommendation-field" for="recommendation-mode">
            <span>조건</span>
            <select id="recommendation-mode">
              <option value="near" selected>레벨 근접</option>
              <option value="touch">레벨 터치</option>
              <option value="breakout_up">상향 돌파</option>
              <option value="breakdown_down">하향 이탈</option>
            </select>
          </label>

          <label class="recommendation-field" for="recommendation-lookback">
            <span>탐지 범위</span>
            <select id="recommendation-lookback">
              <option value="1" selected>기준일</option>
              <option value="3">최근 3거래일</option>
              <option value="5">최근 5거래일</option>
            </select>
          </label>

          <label class="recommendation-field" for="recommendation-tolerance">
            <span>허용 오차</span>
            <select id="recommendation-tolerance">
              <option value="0.005">±0.5%</option>
              <option value="0.01" selected>±1.0%</option>
              <option value="0.015">±1.5%</option>
              <option value="0.02">±2.0%</option>
            </select>
          </label>

        </div>
      </div>

      <div id="recommendation-summary" class="recommendation-summary">필터를 고른 뒤 추천 찾기를 누르면 후보 종목이 여기에 표시됩니다.</div>
      <div id="recommendation-list" class="recommendation-list"></div>
    </section>

    <section id="dashboard-table" class="table-card panel" data-view-page="dashboard" hidden>
      <div class="section-head table-head">
        <div>
          <h2>월간 표</h2>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>

      <div id="mobile-compare" class="mobile-compare" hidden>
        <div id="mobile-compare-controls" class="mobile-compare-controls" hidden>
          <button id="mobile-prev-button" class="mobile-nav-button" type="button" aria-label="이전 종목">‹</button>
          <div id="mobile-compare-count" class="mobile-compare-count">1 / 1</div>
          <button id="mobile-next-button" class="mobile-nav-button" type="button" aria-label="다음 종목">›</button>
        </div>

        <div id="mobile-compare-track" class="mobile-compare-track"></div>

        <div id="mobile-compare-dots" class="mobile-compare-dots"></div>
      </div>

      <div id="empty-state" class="empty-state">
        데이터를 불러오면 여기에 날짜별 등가율 표가 표시됩니다.
      </div>
    </section>

    <section id="calculator-page" class="calculator-card panel" data-view-page="calculator">
      <div class="section-head calculator-head">
        <div>
          <h2>계산기</h2>
        </div>
        <button id="calculator-reset-button" class="ghost-button" type="button">전체 초기화</button>
      </div>

      <div id="calculator-grid" class="calculator-grid"></div>
    </section>
  </main>

  <nav class="mobile-bottom-nav" aria-label="모바일 메뉴">
    <button
      class="mobile-bottom-nav-button is-active"
      type="button"
      data-view="calculator"
      aria-pressed="true"
    >계산기</button>
    <button
      class="mobile-bottom-nav-button"
      type="button"
      data-view="dashboard"
      aria-pressed="false"
    >등가율</button>
    <button
      class="mobile-bottom-nav-button"
      type="button"
      data-view="recommendations"
      aria-pressed="false"
    >종목추천</button>
  </nav>

  <datalist id="ticker-list"></datalist>

  <script src="./config.js?v=20260502b"></script>
  <script>
    window.PP_CONFIG = window.PP_CONFIG || {};
    window.PP_CONFIG.dashboardSourceMode = "api";
  </script>
  <script src="./usage-logger.js?v=20260502a"></script>
  <script src="./dashboard-api-source.js?v=20260502a"></script>
  <script src="./app.js?v=20260502e"></script>
  <script src="./runtime-patches.js?v=20260502c"></script>
  <script src="./calculator.js?v=20260502a"></script>
</body>
</html>
